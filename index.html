<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaludLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="images/logo.jpg" alt="SaludLink Logo" class="logo">
        <h1>SaludLink</h1>
    </header>
    <main>
        <section>
            <h2>Buscar Usuario</h2>
            <form id="searchForm">
                <label for="searchId">Cédula:</label>
                <input type="text" id="searchId" name="searchId" required pattern="[0-9]{3}-[0-9]{6}-[0-9]{4}" placeholder="Ej: 001-234567-8901">
                <button type="submit">Buscar</button>
            </form>
            <div id="searchResults"></div>
        </section>

        <section>
            <h2>Formulario de Información General</h2>
            <form id="infoForm">
                <fieldset>
                    <legend>Información Personal</legend>
                    <div class="form-group">
                        <label for="name">Nombre Completo:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="dob">Fecha de Nacimiento:</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Género:</label>
                        <select id="gender" name="gender" required>
                            <option value="" disabled selected>Seleccione</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="No especificar">Prefiero no decir</option>
                        </select><br><br>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Teléfono:</label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{4}-[0-9]{4}" placeholder="Ej: 8888-8888" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Correo Electrónico:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Historial Médico</legend>
                    <div class="form-group">
                        <label for="blood_type">Tipo de Sangre:</label>
                        <select id="blood_type" name="blood_type" required>
                            <option value="" disabled selected>Seleccione</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="Ninguna">Ninguna</option>
                        </select><br><br>
                    </div>

                    <div class="form-group">
                        <label for="diseases">Enfermedades:</label>
                        <select id="diseases" name="diseases" required>
                            <option value="" disabled selected>Seleccione</option>
                            <option value="Enfermedades Cardiovasculares">Enfermedades Cardiovasculares</option>
                            <option value="Diabetes mellitus">Diabetes mellitus</option>
                            <option value="Ninguna">Ninguna</option>
                        </select><br><br>
                    </div>

                    <div class="form-group">
                        <label for="surgeries">Cirugías o procedimientos médicos importantes:</label>
                        <select id="surgeries" name="surgeries" required>
                            <option value="" disabled selected>Seleccione</option>
                            <option value="Cirugía General">Cirugía General</option>
                            <option value="Cirugía Cardíaca">Cirugía Cardíaca</option>
                            <option value="Ninguna">Ninguna</option>
                        </select><br><br>
                    </div>
                    
                    <div class="form-group">
                        <label for="family_history">Antecedentes de enfermedades hereditarias:</label>
                        <select id="family_history" name="family_history" required>
                            <option value="" disabled selected>Seleccione</option>
                            <option value="Fibrosis Quística">Fibrosis Quística</option>
                            <option value="Distrofia Muscular">Distrofia Muscular</option>
                            <option value="Ninguna">Ninguna</option>
                        </select><br><br>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Condiciones Actuales</legend>
                    <div class="form-group">
                        <label for="substances">¿Consume tabaco, licor o alguna sustancia?</label>
                        <textarea id="substances" name="substances" rows="2" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="diet_exercise">¿Cómo describiría su alimentación y hábitos de ejercicios?</label>
                        <textarea id="diet_exercise" name="diet_exercise" rows="2" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="stress_mood">¿Cómo maneja el estrés y el estado de ánimo?</label>
                        <textarea id="stress_mood" name="stress_mood" rows="2" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="mental_treatment">¿Ha recibido tratamiento para ansiedad o depresión?</label>
                        <textarea id="mental_treatment" name="mental_treatment" rows="2" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="therapy">¿Ha acudido a terapia psicológica o psiquiátrica?</label>
                        <textarea id="therapy" name="therapy" rows="2" required></textarea>
                    </div>
                </fieldset>
                
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 SaludLink. Todos los derechos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
